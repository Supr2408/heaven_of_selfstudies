version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: nptel-hub-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: nptel-hub
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - nptel-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nptel-hub-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/nptel-hub
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_this}
      FRONTEND_URL: http://localhost:3000
      EMAIL_USER: ${EMAIL_USER:-your_email@gmail.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-your_password}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - nptel-network
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
        NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    container_name: nptel-hub-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - nptel-network
    restart: unless-stopped

volumes:
  mongo_data:
  mongo_config:

networks:
  nptel-network:
    driver: bridge
